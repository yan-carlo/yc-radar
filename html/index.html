<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YC Radar - Sistema de Radar Aereo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="radar-container" class="hidden">
        <!-- Panel principal del radar -->
        <div id="radar-panel">
            <!-- Header con info del radar -->
            <div id="radar-header">
                <div id="radar-title">RADAR AEREO</div>
                <div id="radar-label"></div>
                <button id="btn-close" title="Cerrar Radar">&times;</button>
            </div>

            <!-- Area del radar circular -->
            <div id="radar-display-wrapper">
                <div id="radar-display">
                    <canvas id="radar-canvas"></canvas>
                </div>

                <!-- Controles de zoom flotantes sobre el radar -->
                <div id="zoom-controls">
                    <button id="btn-zoom-in" class="zoom-btn" title="Acercar">+</button>
                    <span id="zoom-level">1x</span>
                    <button id="btn-zoom-out" class="zoom-btn" title="Alejar">&minus;</button>
                    <button id="btn-zoom-reset" class="zoom-btn zoom-btn-text" title="Reset">RST</button>
                </div>
            </div>

            <!-- Panel de informacion inferior -->
            <div id="radar-info-panel">
                <div class="info-row">
                    <div class="info-item">
                        <span class="info-label" data-locale="info_radius">RADIO</span>
                        <span class="info-value" id="info-radius">---</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label" data-locale="info_min_alt">ALT MIN</span>
                        <span class="info-value" id="info-min-alt">---</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label" data-locale="info_contacts">CONTACTOS</span>
                        <span class="info-value" id="info-contacts">0</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label" data-locale="info_hidden">OCULTOS</span>
                        <span class="info-value" id="info-hidden">0</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label" data-locale="info_zoom">ZOOM</span>
                        <span class="info-value" id="info-zoom">1x</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label" data-locale="info_status">ESTADO</span>
                        <span class="info-value status-active" id="info-status">ACTIVO</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Panel lateral de contactos -->
        <div id="contacts-panel">
            <div id="contacts-header">
                <span data-locale="contacts_detected">CONTACTOS DETECTADOS</span>
            </div>
            <div id="contacts-list"></div>
        </div>
    </div>

    <!-- HUD de piloto (visible al pilotar aeronaves) -->
    <div id="pilot-hud" class="hidden">
        <div id="hud-compass-wrapper">
            <canvas id="hud-compass-canvas"></canvas>
        </div>
        <div id="hud-info">
            <div class="hud-data-item">
                <span class="hud-data-label">HDG</span>
                <span class="hud-data-value" id="hud-heading">---&deg;</span>
            </div>
            <div class="hud-data-item">
                <span class="hud-data-label">ALT</span>
                <span class="hud-data-value" id="hud-altitude">--- m</span>
            </div>
            <div class="hud-data-item">
                <span class="hud-data-label">SPD</span>
                <span class="hud-data-value" id="hud-speed">--- km/h</span>
            </div>
            <div class="hud-data-item">
                <span class="hud-data-label">XPDR</span>
                <span class="hud-data-value hud-xpdr-on" id="hud-transponder">ON</span>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
